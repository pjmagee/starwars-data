workflow: GitFlow/v1
strategies:
  - Mainline
  - TaggedCommit
  - ConfiguredNextVersion

branches:
  main:
    regex: ^main$
    increment: Patch
    is-main-branch: true
    label: ""
    prevent-increment:
      when-current-commit-tagged: false
  feature:
    regex: ^(feature|feat)[/-]
    increment: Minor
    label: "{BranchName}"
  fix:
    regex: ^(fix|hotfix|bugfix)[/-]
    increment: Patch
    label: "{BranchName}"

major-version-bump-message: "^(breaking|major)"
minor-version-bump-message: "^(feat|feature)"
patch-version-bump-message: "^(fix|patch|chore|refactor|docs|style|test|ci|build|perf)"
