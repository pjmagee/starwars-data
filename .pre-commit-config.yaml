repos:
  - repo: local
    hooks:
      - id: csharpier
        name: csharpier
        entry: dotnet csharpier format
        language: system
        types: [c#]
      - id: dotnet-build
        name: dotnet build
        entry: dotnet build src/StarWarsData.slnx --no-restore -c Release
        language: system
        pass_filenames: false
        files: \.(cs|razor|csproj|slnx)$
      - id: dotnet-test
        name: dotnet test (Unit + Integration tiers)
        entry: dotnet test --project src/StarWarsData.Tests/StarWarsData.Tests.csproj --no-restore -c Release --filter "TestCategory=Unit|TestCategory=Integration"
        language: system
        pass_filenames: false
        files: \.(cs|razor|csproj|slnx)$
