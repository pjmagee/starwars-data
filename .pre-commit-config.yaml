repos:
  - repo: local
    hooks:
      - id: csharpier
        name: csharpier
        entry: dotnet csharpier format
        language: system
        types: [c#]
      - id: dotnet-build
        name: dotnet build
        entry: dotnet build src/StarWarsData.slnx --no-restore -c Release
        language: system
        pass_filenames: false
        files: \.(cs|razor|csproj|slnx)$
