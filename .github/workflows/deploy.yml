name: Build & Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for GitVersion

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: "6.x"

      - name: Calculate version
        id: version
        uses: gittools/actions/gitversion/execute@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install Aspire CLI
        run: |
          curl -sSL https://aspire.dev/install.sh | bash
          echo "$HOME/.aspire/bin" >> $GITHUB_PATH

      - name: Build solution
        run: |
          dotnet build src/StarWarsData.slnx -c Release \
            /p:Version=${{ steps.version.outputs.semVer }} \
            /p:AssemblyVersion=${{ steps.version.outputs.assemblySemVer }} \
            /p:FileVersion=${{ steps.version.outputs.assemblySemFileVer }} \
            /p:InformationalVersion=${{ steps.version.outputs.informationalVersion }}

      - name: Run tests
        run: dotnet test src/StarWarsData.Tests -c Release --no-build --filter 'Category!=Integration&Category!=MongoFixture'

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container images (versioned)
        run: aspire do push --project src/StarWarsData.AppHost/StarWarsData.AppHost.csproj
        env:
          CONTAINER_IMAGE_TAG: ${{ steps.version.outputs.semVer }}

      - name: Build and push container images (latest)
        run: aspire do push --project src/StarWarsData.AppHost/StarWarsData.AppHost.csproj
        env:
          CONTAINER_IMAGE_TAG: latest

      - name: Publish Docker Compose artifacts
        run: |
          aspire publish \
            --project src/StarWarsData.AppHost/StarWarsData.AppHost.csproj \
            --output-path ./aspire-output

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: ./aspire-output/
          retention-days: 30
          include-hidden-files: true

      - name: Tag release
        run: |
          git tag "v${{ steps.version.outputs.semVer }}"
          git push origin "v${{ steps.version.outputs.semVer }}"
