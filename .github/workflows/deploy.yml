name: Build & Publish

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "eng/**"
      - ".claude/**"
      - ".agents/**"
      - ".editorconfig"
      - "NOTES.md"
      - "LICENSE"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for GitVersion

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: "6.x"

      - name: Calculate version
        id: version
        uses: gittools/actions/gitversion/execute@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install Aspire CLI
        run: |
          curl -sSL https://aspire.dev/install.sh | bash
          echo "$HOME/.aspire/bin" >> $GITHUB_PATH

      - name: Build solution
        run: |
          dotnet build src/StarWarsData.slnx -c Release \
            /p:Version=${{ steps.version.outputs.semVer }} \
            /p:AssemblyVersion=${{ steps.version.outputs.assemblySemVer }} \
            /p:FileVersion=${{ steps.version.outputs.assemblySemFileVer }} \
            /p:InformationalVersion=${{ steps.version.outputs.informationalVersion }}

      - name: Run tests
        run: dotnet test --project src/StarWarsData.Tests -c Release --no-build --filter 'TestCategory=Unit'

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container images (versioned)
        run: aspire do push --apphost src/StarWarsData.AppHost/StarWarsData.AppHost.csproj
        env:
          CONTAINER_IMAGE_TAG: ${{ steps.version.outputs.semVer }}

      - name: Build and push container images (latest)
        run: aspire do push --apphost src/StarWarsData.AppHost/StarWarsData.AppHost.csproj
        env:
          CONTAINER_IMAGE_TAG: latest

      # Resolves parameter values from:
      #   1. Parameters__* env vars below (3 secrets)
      #   2. appsettings.Production.json (mongo-host, mongo-port, starwars-db)
      #   3. inline defaults in Program.cs (keycloak-admin-secret = "")
      # Filled .env.Production lands in ./aspire-output/ and is uploaded as the release artifact.
      - name: Prepare deployment artifacts (filled .env.Production)
        run: |
          aspire do prepare-starwars \
            -e Production \
            --apphost src/StarWarsData.AppHost/StarWarsData.AppHost.csproj \
            --non-interactive \
            --output-path ./aspire-output
        env:
          CONTAINER_IMAGE_TAG: ${{ steps.version.outputs.semVer }}
          Parameters__openapi:        ${{ secrets.STARWARS_OPENAI_KEY }}
          Parameters__mongo_user:     ${{ secrets.MONGO_USER }}
          Parameters__mongo_password: ${{ secrets.MONGO_PASSWORD }}

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: ./aspire-output/
          retention-days: 30
          include-hidden-files: true

      - name: Tag release
        run: |
          git tag "v${{ steps.version.outputs.semVer }}"
          git push origin "v${{ steps.version.outputs.semVer }}"
