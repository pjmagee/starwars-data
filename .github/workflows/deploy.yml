name: Build & Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install Aspire CLI
        run: |
          curl -sSL https://aspire.dev/install.sh | bash
          echo "$HOME/.aspire/bin" >> $GITHUB_PATH

      - name: Build solution
        run: dotnet build src/StarWarsData.slnx -c Release

      - name: Run tests
        run: dotnet test src/StarWarsData.Tests -c Release --no-build --filter 'Category!=Integration&Category!=MongoFixture'

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container images
        run: aspire do push --project src/StarWarsData.AppHost/StarWarsData.AppHost.csproj

      - name: Tag and push latest
        run: |
          # Find the aspire-deploy-* tagged images and also tag as latest
          for repo in apiservice frontend; do
            TAG=$(docker images "ghcr.io/pjmagee/${repo}" --format '{{.Tag}}' | grep aspire-deploy | head -1)
            if [ -n "$TAG" ]; then
              docker tag "ghcr.io/pjmagee/${repo}:${TAG}" "ghcr.io/pjmagee/${repo}:latest"
              docker push "ghcr.io/pjmagee/${repo}:latest"
            fi
          done

      - name: Publish Docker Compose artifacts
        run: |
          aspire publish \
            --project src/StarWarsData.AppHost/StarWarsData.AppHost.csproj \
            --output-path ./aspire-output

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: ./aspire-output/
          retention-days: 30
          include-hidden-files: true
